kind = "web"
previewPath = "/"
title = "B2B Trade Portal"
version = "1.0.0"
id = "artifacts/trade-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24536

[services.development]
run = "pnpm --filter @workspace/trade-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trade-portal", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/trade-portal", "run", "start" ]

[services.env]
PORT = "24536"
